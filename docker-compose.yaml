version: '3.9'

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: mykernel-dev
    container_name: mykernel-dev
    volumes:
      - .:/root/env
    working_dir: /root/env
    stdin_open: true
    tty: true
    command: bash
    environment:
      - TERM=xterm-256color
